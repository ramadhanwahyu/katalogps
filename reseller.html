</div>

  <!-- Header sticky -->

  <!-- Toolbar: search + sort + kategori -->
  <div class="toolbar">
    <div class="toolbar-inner">

            <svg viewBox="0 0 20 20" fill="none" width="16" height="16">

              <path d="M13 13l3.5 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </span>
          <input type="text" id="searchInput" placeholder="Cari judul atau penerbit…" autocomplete="off">
        </div>
        <div class="toolbar-row2">
            <select class="filter-select" id="publisherSelect">
                <option value="all">Semua penerbit</option>
            </select>
            <select class="sort-select" id="sortSelect">
                <option value="default">Urutan asli</option>
                <option value="title-az">Judul A–Z</option>
                <option value="title-za">Judul Z–A</option>
                <option value="price-asc">Harga: Rendah–Tinggi</option>
                <option value="price-desc">Harga: Tinggi–Rendah</option>
            </select>
        </div>
      </div>
      <div class="category-scroll" id="categoryScroll">
        <button class="cat-chip active" data-cat="all">Semua</button>
      </div>
    </div>
  </div>

  <!-- Result info -->
  <div class="result-bar">
    <span id="resultCount"></span>
    <span id="pageInfo"></span>
  </div>

  <!-- States -->
  <div id="loading" class="state-msg">Memuat katalog…</div>
  <div id="errorMsg" class="state-msg state-error" style="display:none;"></div>

  <!-- Grid -->

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>

  <footer class="cat-footer">
    © Pustaka Salafiyah – Salafi Kids &nbsp;·&nbsp; Data diperbarui otomatis
  </footer>

  <script src="catalog.js"></script>
  <script>
    initCatalog({
      priceCol:     "Harga reseller",
      discountCol:  "Diskon reseller",
      basePriceCol: "Harga katalog"
    });
  </script>
<script>
  (function () {
    const PASS    = "katalog1234";
    const KEY     = "reseller_auth";
    const gate    = document.getElementById("pwGate");
    const input   = document.getElementById("pwInput");
    const submit  = document.getElementById("pwSubmit");
    const errMsg  = document.getElementById("pwError");
    const toggle  = document.getElementById("pwToggle");

    // Jika sudah auth di sesi ini, langsung sembunyikan gate
    if (sessionStorage.getItem(KEY) === "1") {
      gate.style.display = "none";
      return;
    }

    // Kunci scroll halaman di belakang gate
    document.body.style.overflow = "hidden";

    function attempt() {
      if (input.value === PASS) {
        sessionStorage.setItem(KEY, "1");
        gate.style.display = "none";
        document.body.style.overflow = "";
      } else {
        errMsg.textContent = "Password salah. Coba lagi.";
        input.value = "";
        input.focus();
      }
    }

    submit.addEventListener("click", attempt);
    input.addEventListener("keydown", e => { if (e.key === "Enter") attempt(); });

    // Toggle show/hide password
    toggle.addEventListener("click", () => {
      const isText = input.type === "text";
      input.type = isText ? "password" : "text";
      toggle.querySelector("svg").style.opacity = isText ? "1" : "0.4";
    });

    input.focus();
  })();
</script>
</body>
</html>
